<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DeepShield | Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container result-container">
        <div class="result-card">
            <h1>🧠 DeepShield Result</h1>

            <!-- LABEL: REAL / FAKE -->
            <div class="label {% if result == 'FAKE' %}fake{% else %}real{% endif %}">
                {{ result }}
            </div>

            <!-- CONFIDENCE BAR -->
            <div class="confidence">
                {% set pct = (confidence * 100) | round(2) %}
                {# pick bar color based on result #}
                <div
                    class="confidence-fill"
                    style="
                        width: {{ pct }}%;
                        {% if result == 'FAKE' %}
                            background: linear-gradient(135deg, #ef4444, #dc2626);
                        {% else %}
                            background: linear-gradient(135deg, #22c55e, #16a34a);
                        {% endif %}
                    ">
                </div>
                <div class="confidence-text">
                    Confidence: {{ pct }}%
                </div>
            </div>

            <!-- HUMAN-READABLE REMARK / EXPLANATION -->
            <div class="explanation">
                {{ remark }}
            </div>

            <!-- BACK BUTTON -->
            <a href="/" class="back-btn">🔄 Analyze Another Image</a>
        </div>
    </div>
</body>
</html>
