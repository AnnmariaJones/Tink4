<!DOCTYPE html>
<html>
<head>
    <title>Analysis Result | DeepShield</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🔎 Deepfake Analysis Report</h1>

    <div class="result-card">

        <h2 class="{{ 'fake' if prediction == 'AI-Generated' else 'real' }}">
            {{ prediction }}
        </h2>

        <div class="confidence">
            Confidence Score: <strong>{{ confidence }}%</strong>
        </div>

        <div class="explanation">
            <h3>🧠 Model Explanation</h3>
            <p>{{ explanation }}</p>
        </div>

        <a href="/" class="back-btn">⬅ Analyze Another Image</a>

    </div>

</div>

</body>
</html>
